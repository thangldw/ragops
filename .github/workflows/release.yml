name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: pip install -e '.[dev]'
      - run: pytest
      - run: ruff check .
      - run: python -m build
      - name: Generate reproducible CycloneDX SBOM
        run: |
          python -m venv /tmp/ragops-sbom
          /tmp/ragops-sbom/bin/pip install dist/*.whl
          python -m pip install cyclonedx-bom==7.3.0
          cyclonedx-py environment /tmp/ragops-sbom/bin/python \
            --output-reproducible \
            --output-file "dist/ragops-${GITHUB_REF_NAME#v}.cdx.json"
      - name: Record artifact checksums
        run: (cd dist && sha256sum ragops-* > SHA256SUMS)
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-package
          path: dist/
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --verify-tag \
              --title "RAGOps $GITHUB_REF_NAME" \
              --generate-notes
          fi
