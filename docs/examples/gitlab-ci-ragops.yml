ragops_release_gate:
  stage: test
  image: python:3.12-slim
  variables:
    RAGOPS_VERSION: "2.3.0"
    RAGOPS_SCENARIO: "scenarios/japanese_troubleshooting/benchmark-v0.2.json"
    RAGOPS_BASELINE: "scenarios/japanese_troubleshooting/benchmark-baseline.json"
    RAGOPS_CANDIDATE: "scenarios/japanese_troubleshooting/benchmark-regressed.json"
    RAGOPS_POLICY: ""
  before_script:
    - python -m pip install --disable-pip-version-check "ragops==$RAGOPS_VERSION"
  script:
    - |
      set +e
      if [ -n "$RAGOPS_POLICY" ]; then
        ragops compare \
          --scenario "$RAGOPS_SCENARIO" \
          --baseline "$RAGOPS_BASELINE" \
          --candidate "$RAGOPS_CANDIDATE" \
          --policy "$RAGOPS_POLICY" \
          --format markdown \
          --output ragops-report.md >ragops-command.log 2>&1
      else
        ragops compare \
          --scenario "$RAGOPS_SCENARIO" \
          --baseline "$RAGOPS_BASELINE" \
          --candidate "$RAGOPS_CANDIDATE" \
          --format markdown \
          --output ragops-report.md >ragops-command.log 2>&1
      fi
      gate_exit=$?
      set -e
      if [ ! -f ragops-report.md ]; then
        {
          echo "# RAGOps release gate error"
          echo
          echo '```text'
          cat ragops-command.log
          echo '```'
        } >ragops-report.md
      fi
      cat ragops-report.md
      exit "$gate_exit"
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - ragops-report.md
      - ragops-command.log
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
