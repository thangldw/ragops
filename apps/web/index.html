<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RAGOps Workbench</title>
<style>:root{color-scheme:dark;--ink:#e8edf6;--muted:#9aa8bd;--panel:#151c29;--line:#293447;--accent:#5de4c7}*{box-sizing:border-box}body{margin:0;background:#0b1019;color:var(--ink);font:15px/1.5 system-ui,sans-serif}main{max-width:1080px;margin:auto;padding:56px 24px}header{display:flex;justify-content:space-between;gap:24px;align-items:end}h1{font-size:clamp(36px,6vw,68px);line-height:1;margin:0}.eyebrow{color:var(--accent);font-weight:700;letter-spacing:.12em;text-transform:uppercase}.lede{max-width:620px;color:var(--muted);font-size:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:40px}section{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px}label{display:block;margin:12px 0 6px;color:var(--muted)}textarea{width:100%;min-height:210px;background:#0c121d;color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:12px;font:12px ui-monospace,monospace}button{margin-top:16px;background:var(--accent);border:0;border-radius:9px;padding:11px 18px;font-weight:800;color:#07120f;cursor:pointer}.metric{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}#status{font-size:28px;font-weight:800}.pass{color:#5de4c7}.fail{color:#ff7b86}code{color:#a6c8ff}@media(max-width:760px){.grid{grid-template-columns:1fr}header{display:block}}</style></head>
<body><main><header><div><div class="eyebrow">Release confidence for AI systems</div><h1>RAGOps</h1></div><p class="lede">Evaluate quality, operational budgets, and policy failures locally—without sending evaluation data to a model provider.</p></header><div class="grid"><section><h2>Evaluation input</h2><label for="scenario">Scenario JSON</label><textarea id="scenario"></textarea><label for="responses">Responses JSON</label><textarea id="responses"></textarea><button id="run">Run evaluation</button></section><section><h2>Release decision</h2><div id="status">Waiting for a run</div><div id="metrics"></div><h3>Failed gates</h3><ul id="gates"><li>None</li></ul></section></div><p class="lede">API documentation: <code>/docs</code> · Health: <code>/health</code></p></main>
<script>const s=document.querySelector('#scenario'),r=document.querySelector('#responses');s.value='{"schema_version":"0.1","id":"demo","name":"Demo","thresholds":{"citation_coverage":1,"lexical_groundedness":0.5,"max_latency_ms":3000,"max_cost_usd":0.03},"cases":[{"id":"q1","question":"What is the policy?","evidence":["The policy requires human approval."],"required_citation_ids":["policy-1"]}]}';r.value='[{"case_id":"q1","answer":"The policy requires human approval.","citation_ids":["policy-1"],"latency_ms":900,"cost_usd":0.01}]';document.querySelector('#run').onclick=async()=>{const st=document.querySelector('#status');try{const x=await fetch('/v1/evaluate',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({scenario:JSON.parse(s.value),responses:JSON.parse(r.value)})}),d=await x.json();if(!x.ok)throw Error(d.detail||'Evaluation failed');st.textContent=d.passed?'PASS':'FAIL';st.className=d.passed?'pass':'fail';document.querySelector('#metrics').innerHTML=Object.entries(d.metrics).map(([k,v])=>`<div class="metric"><span>${k}</span><strong>${Number(v).toFixed(4)}</strong></div>`).join('');document.querySelector('#gates').innerHTML=(d.failed_gates.length?d.failed_gates:['None']).map(v=>`<li>${v}</li>`).join('')}catch(e){st.textContent=e.message;st.className='fail'}};</script></body></html>
