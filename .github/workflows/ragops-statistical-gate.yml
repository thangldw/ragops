name: RAGOps reusable statistical gate

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version used to run RAGOps
        required: false
        type: string
        default: "3.12"
      ragops-version:
        description: RAGOps Git revision or milestone tag to install
        required: false
        type: string
        default: "v1.0"
      mode:
        description: fixed or sequential statistical decision
        required: false
        type: string
        default: "fixed"
      baseline-bundle:
        description: Caller-relative accepted baseline replay bundle
        required: true
        type: string
      candidate-bundle:
        description: Caller-relative candidate replay bundle
        required: true
        type: string
      policy:
        description: Caller-relative statistical or sequential policy
        required: true
        type: string
      baseline-manifest:
        description: Optional content-addressed baseline manifest
        required: false
        type: string
        default: ""
      baseline-signature:
        description: Optional detached SSH baseline signature
        required: false
        type: string
        default: ""
      allowed-signers:
        description: Optional SSH allowed-signers file
        required: false
        type: string
        default: ""
      signer-identity:
        description: Optional SSH signer identity
        required: false
        type: string
        default: ""

jobs:
  statistical-release-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install RAGOps
        env:
          RAGOPS_VERSION: ${{ inputs.ragops-version }}
        run: >-
          python -m pip install
          "ragops @ git+https://github.com/thangldw/ragops.git@${RAGOPS_VERSION}"
      - name: Verify accepted baseline evidence
        if: inputs.baseline-manifest != ''
        shell: bash
        env:
          RAGOPS_BASELINE: ${{ inputs.baseline-bundle }}
          RAGOPS_POLICY: ${{ inputs.policy }}
          RAGOPS_MANIFEST: ${{ inputs.baseline-manifest }}
          RAGOPS_SIGNATURE: ${{ inputs.baseline-signature }}
          RAGOPS_ALLOWED_SIGNERS: ${{ inputs.allowed-signers }}
          RAGOPS_SIGNER_IDENTITY: ${{ inputs.signer-identity }}
        run: |
          command=(
            ragops baseline-verify
            --manifest "$RAGOPS_MANIFEST"
            --bundle "$RAGOPS_BASELINE"
            --policy "$RAGOPS_POLICY"
          )
          if [[ -n "$RAGOPS_SIGNATURE" || -n "$RAGOPS_ALLOWED_SIGNERS" || -n "$RAGOPS_SIGNER_IDENTITY" ]]; then
            if [[ -z "$RAGOPS_SIGNATURE" || -z "$RAGOPS_ALLOWED_SIGNERS" || -z "$RAGOPS_SIGNER_IDENTITY" ]]; then
              echo "All SSH signature inputs are required together." >&2
              exit 1
            fi
            command+=(
              --signature "$RAGOPS_SIGNATURE"
              --allowed-signers "$RAGOPS_ALLOWED_SIGNERS"
              --identity "$RAGOPS_SIGNER_IDENTITY"
            )
          fi
          "${command[@]}"
      - id: gate
        name: Compare repeated candidate evidence
        shell: bash
        env:
          RAGOPS_MODE: ${{ inputs.mode }}
          RAGOPS_BASELINE: ${{ inputs.baseline-bundle }}
          RAGOPS_CANDIDATE: ${{ inputs.candidate-bundle }}
          RAGOPS_POLICY: ${{ inputs.policy }}
        run: |
          set +e
          case "$RAGOPS_MODE" in
            fixed) subcommand=compare-runs ;;
            sequential) subcommand=compare-sequential ;;
            *) echo "mode must be fixed or sequential" >&2; exit 1 ;;
          esac
          ragops "$subcommand" \
            --baseline-bundle "$RAGOPS_BASELINE" \
            --candidate-bundle "$RAGOPS_CANDIDATE" \
            --policy "$RAGOPS_POLICY" \
            --format markdown \
            --output ragops-report.md \
            >ragops-command.log 2>&1
          gate_exit=$?
          set -e
          if [[ ! -f ragops-report.md ]]; then
            {
              echo "# RAGOps statistical gate error"
              echo
              echo '```text'
              cat ragops-command.log
              echo '```'
            } >ragops-report.md
          fi
          echo "exit_code=$gate_exit" >>"$GITHUB_OUTPUT"
      - name: Write bounded evidence manifest
        if: always()
        env:
          RAGOPS_EVENT_NAME: ${{ github.event_name }}
          RAGOPS_GATE_EXIT: ${{ steps.gate.outputs.exit_code }}
          RAGOPS_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          RAGOPS_MODE: ${{ inputs.mode }}
          RAGOPS_PR_NUMBER: ${{ github.event.pull_request.number }}
          RAGOPS_WORKFLOW: ${{ github.workflow }}
        run: |
          python - <<'PY'
          import json
          import os

          gate_exit = os.environ.get("RAGOPS_GATE_EXIT", "")
          manifest = {
              "schema_version": "ragops-github-evidence-0.1",
              "repository": os.environ["GITHUB_REPOSITORY"],
              "event_name": os.environ["RAGOPS_EVENT_NAME"],
              "workflow": os.environ["RAGOPS_WORKFLOW"],
              "run_id": int(os.environ["GITHUB_RUN_ID"]),
              "head_sha": os.environ["RAGOPS_HEAD_SHA"],
              "pull_request_number": int(os.environ["RAGOPS_PR_NUMBER"] or 0),
              "gate_exit_code": int(gate_exit) if gate_exit else -1,
              "gate_kind": f"statistical-{os.environ['RAGOPS_MODE']}",
          }
          with open("ragops-evidence.json", "w", encoding="utf-8") as output:
              json.dump(manifest, output, ensure_ascii=False, indent=2)
              output.write("\n")
          PY
      - name: Publish evidence to job summary
        if: always()
        run: cat ragops-report.md >>"$GITHUB_STEP_SUMMARY"
      - name: Upload statistical release evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ragops-release-evidence
          path: |
            ragops-report.md
            ragops-command.log
            ragops-evidence.json
      - name: Enforce statistical release decision
        if: always()
        env:
          RAGOPS_GATE_EXIT: ${{ steps.gate.outputs.exit_code }}
        run: |
          if [[ -z "$RAGOPS_GATE_EXIT" ]]; then
            echo "RAGOps statistical gate did not produce an exit code." >&2
            exit 1
          fi
          exit "$RAGOPS_GATE_EXIT"
