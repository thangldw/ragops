<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1200 520">
  <title id="title">RAGOps release-gate workflow</title>
  <desc id="desc">A light collaborative board showing portable evidence moving through evaluation, baseline comparison, and an explainable pass or block release decision.</desc>
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#d3cfc5"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#29231a" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#756f84"/>
    </marker>
  </defs>

  <rect width="1200" height="520" rx="26" fill="#f8f6f0"/>
  <rect width="1200" height="520" rx="26" fill="url(#dots)"/>
  <text x="54" y="52" fill="#5a3fe0" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="800" letter-spacing="2">RELEASE-GATE WORKFLOW</text>
  <text x="54" y="88" fill="#17152f" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="26" font-weight="750">Portable evidence in. Explainable decision out.</text>

  <g fill="none" stroke="#756f84" stroke-width="3" stroke-dasharray="8 8" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M262 246C302 246 313 246 350 246"/>
    <path d="M536 246C576 246 587 246 624 246"/>
    <path d="M810 246C850 246 861 246 898 246"/>
  </g>

  <g filter="url(#shadow)" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <g transform="translate(54 156) rotate(-1 104 90)">
      <rect width="208" height="180" fill="#ffdc7c" stroke="#17152f" stroke-width="2"/>
      <circle cx="34" cy="34" r="19" fill="#fffef9" stroke="#17152f" stroke-width="2"/>
      <text x="34" y="39" text-anchor="middle" font-size="12" font-weight="800" fill="#17152f">01</text>
      <text x="24" y="92" font-size="20" font-weight="750" fill="#17152f">Record</text>
      <text x="24" y="120" font-size="12" fill="#4e4939">Answers · citations · retrievals</text>
      <text x="24" y="140" font-size="12" fill="#4e4939">latency · cost · metadata</text>
    </g>

    <g transform="translate(350 156) rotate(1 104 90)">
      <rect width="208" height="180" fill="#bfe8ff" stroke="#17152f" stroke-width="2"/>
      <circle cx="34" cy="34" r="19" fill="#fffef9" stroke="#17152f" stroke-width="2"/>
      <text x="34" y="39" text-anchor="middle" font-size="12" font-weight="800" fill="#17152f">02</text>
      <text x="24" y="92" font-size="20" font-weight="750" fill="#17152f">Evaluate</text>
      <text x="24" y="120" font-size="12" fill="#3e4c54">Versioned checks · findings</text>
      <text x="24" y="140" font-size="12" fill="#3e4c54">optional external metrics</text>
    </g>

    <g transform="translate(646 156) rotate(-1 104 90)">
      <rect width="208" height="180" fill="#d8ceff" stroke="#17152f" stroke-width="2"/>
      <circle cx="34" cy="34" r="19" fill="#fffef9" stroke="#17152f" stroke-width="2"/>
      <text x="34" y="39" text-anchor="middle" font-size="12" font-weight="800" fill="#17152f">03</text>
      <text x="24" y="92" font-size="20" font-weight="750" fill="#17152f">Compare</text>
      <text x="24" y="120" font-size="12" fill="#4c4760">Accepted baseline · candidate</text>
      <text x="24" y="140" font-size="12" fill="#4c4760">explicit regression tolerances</text>
    </g>

    <g transform="translate(942 156) rotate(1 104 90)">
      <rect width="208" height="180" fill="#aee8c9" stroke="#17152f" stroke-width="2"/>
      <circle cx="34" cy="34" r="19" fill="#fffef9" stroke="#17152f" stroke-width="2"/>
      <text x="34" y="39" text-anchor="middle" font-size="12" font-weight="800" fill="#17152f">04</text>
      <text x="24" y="92" font-size="20" font-weight="750" fill="#17152f">Gate</text>
      <text x="24" y="120" font-size="12" fill="#385246">PASS or BLOCK</text>
      <text x="24" y="140" font-size="12" fill="#385246">with named reasons</text>
    </g>
  </g>

  <g font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <rect x="222" y="383" width="756" height="73" rx="12" fill="#fffef9" stroke="#17152f" stroke-width="2"/>
    <text x="246" y="413" font-size="12" font-weight="750" fill="#17152f">Open-source core</text>
    <text x="246" y="437" font-size="12" fill="#625f72">Runs locally without a model API, hosted font, analytics service, or control plane.</text>
    <rect x="819" y="398" width="133" height="31" rx="15" fill="#7357ff"/>
    <text x="885" y="418" text-anchor="middle" font-size="11" font-weight="750" fill="#ffffff">JSON · MD · HTML</text>
  </g>
</svg>
