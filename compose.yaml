services:
  ragops:
    build: .
    ports: ["127.0.0.1:8000:8000"]
    environment:
      RAGOPS_API_KEY: ${RAGOPS_API_KEY:?Set RAGOPS_API_KEY before starting the API}
      RAGOPS_MAX_REQUEST_BYTES: ${RAGOPS_MAX_REQUEST_BYTES:-2097152}
      RAGOPS_MAX_CASES: ${RAGOPS_MAX_CASES:-1000}
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
