<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="480" viewBox="0 0 1400 480" role="img" aria-labelledby="title desc">
  <title id="title">RAGOps release-gate workflow</title>
  <desc id="desc">Application traces flow through versioned scenarios, deterministic and optional evaluators, baseline comparison, and an explainable pass or block decision.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#6f7b8b"/>
    </marker>
  </defs>
  <rect width="1400" height="480" rx="28" fill="#101216"/>
  <text x="64" y="66" fill="#5da2ff" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="700" letter-spacing="3">HOW THE RELEASE GATE WORKS</text>
  <text x="64" y="112" fill="#f4f2ed" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="750">Portable evidence in. Explainable decision out.</text>

  <g font-family="Inter,Arial,sans-serif">
    <g transform="translate(64 164)">
      <rect width="214" height="190" rx="16" fill="#171a20" stroke="#303846"/>
      <circle cx="34" cy="34" r="18" fill="#223b60"/><text x="34" y="40" text-anchor="middle" fill="#b8d5ff" font-size="15" font-weight="700">1</text>
      <text x="24" y="91" fill="#f4f2ed" font-size="21" font-weight="700">RAG / agent app</text>
      <text x="24" y="126" fill="#a7afbc" font-size="15">Answers, citations,</text>
      <text x="24" y="150" fill="#a7afbc" font-size="15">retrievals, tool actions</text>
    </g>
    <path d="M290 259H348" stroke="#6f7b8b" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(360 164)">
      <rect width="214" height="190" rx="16" fill="#171a20" stroke="#303846"/>
      <circle cx="34" cy="34" r="18" fill="#223b60"/><text x="34" y="40" text-anchor="middle" fill="#b8d5ff" font-size="15" font-weight="700">2</text>
      <text x="24" y="91" fill="#f4f2ed" font-size="21" font-weight="700">Portable trace</text>
      <text x="24" y="126" fill="#a7afbc" font-size="15">Provider-independent</text>
      <text x="24" y="150" fill="#a7afbc" font-size="15">JSON / JSONL evidence</text>
    </g>
    <path d="M586 259H644" stroke="#6f7b8b" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(656 164)">
      <rect width="214" height="190" rx="16" fill="#171a20" stroke="#5da2ff"/>
      <circle cx="34" cy="34" r="18" fill="#5da2ff"/><text x="34" y="40" text-anchor="middle" fill="#08101d" font-size="15" font-weight="800">3</text>
      <text x="24" y="91" fill="#f4f2ed" font-size="21" font-weight="700">Versioned checks</text>
      <text x="24" y="126" fill="#a7afbc" font-size="15">Quality · safety</text>
      <text x="24" y="150" fill="#a7afbc" font-size="15">Latency · cost</text>
    </g>
    <path d="M882 259H940" stroke="#6f7b8b" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(952 164)">
      <rect width="214" height="190" rx="16" fill="#171a20" stroke="#303846"/>
      <circle cx="34" cy="34" r="18" fill="#223b60"/><text x="34" y="40" text-anchor="middle" fill="#b8d5ff" font-size="15" font-weight="700">4</text>
      <text x="24" y="91" fill="#f4f2ed" font-size="21" font-weight="700">Compare baseline</text>
      <text x="24" y="126" fill="#a7afbc" font-size="15">Measure candidate</text>
      <text x="24" y="150" fill="#a7afbc" font-size="15">deltas and findings</text>
    </g>
    <path d="M1178 259H1214" stroke="#6f7b8b" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(1226 164)">
      <rect width="110" height="88" rx="14" fill="#17231f" stroke="#4a8f73"/>
      <text x="55" y="53" text-anchor="middle" fill="#7de0b8" font-size="22" font-weight="800">PASS</text>
      <rect y="102" width="110" height="88" rx="14" fill="#25191c" stroke="#9b4d4b"/>
      <text x="55" y="155" text-anchor="middle" fill="#ff847b" font-size="22" font-weight="800">BLOCK</text>
    </g>
  </g>
  <text x="64" y="422" fill="#a7afbc" font-family="Inter,Arial,sans-serif" font-size="15">RAGOps evaluates recorded behavior; it does not own your model, retrieval stack, or application.</text>
</svg>
