name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: pip install -e '.[dev]'
      - run: pytest
      - run: ruff check .
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/
